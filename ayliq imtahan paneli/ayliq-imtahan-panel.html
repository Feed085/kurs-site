<!DOCTYPE html>
<html lang="az">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rim Academy — Aylıq İmtahan Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0f1a;
    --surface: #131729;
    --surface2: #1a1f38;
    --border: rgba(255,255,255,0.07);
    --accent: #4f8ef7;
    --accent2: #7c3aed;
    --gold: #f5a623;
    --green: #22c55e;
    --red: #ef4444;
    --orange: #f97316;
    --text: #e8eaf6;
    --muted: #6b7280;
    --radius: 14px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ROLE SELECTOR */
  #role-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    padding: 40px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(79,142,247,0.12), transparent),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(124,58,237,0.1), transparent);
  }

  .logo-area { text-align: center; }
  .logo-area .brand {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .logo-area h1 {
    font-size: clamp(28px, 5vw, 48px);
    font-weight: 800;
    color: #fff;
    line-height: 1.1;
  }
  .logo-area h1 span {
    background: linear-gradient(135deg, #4f8ef7, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .logo-area p {
    margin-top: 12px;
    color: var(--muted);
    font-size: 15px;
  }

  .role-cards {
    display: flex;
    gap: 20px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .role-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    width: 220px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s cubic-bezier(.4,0,.2,1);
    position: relative;
    overflow: hidden;
  }
  .role-card::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.3s;
    border-radius: 20px;
  }
  .role-card.student::before { background: radial-gradient(circle at 50% 0%, rgba(79,142,247,0.15), transparent 70%); }
  .role-card.teacher::before { background: radial-gradient(circle at 50% 0%, rgba(34,197,94,0.15), transparent 70%); }
  .role-card.admin::before   { background: radial-gradient(circle at 50% 0%, rgba(245,166,35,0.15), transparent 70%); }

  .role-card:hover { transform: translateY(-6px); border-color: rgba(255,255,255,0.15); }
  .role-card:hover::before { opacity: 1; }
  .role-card.student:hover { box-shadow: 0 20px 60px rgba(79,142,247,0.2); }
  .role-card.teacher:hover { box-shadow: 0 20px 60px rgba(34,197,94,0.2); }
  .role-card.admin:hover   { box-shadow: 0 20px 60px rgba(245,166,35,0.2); }

  .role-icon {
    font-size: 42px;
    margin-bottom: 16px;
    display: block;
  }
  .role-card h3 { font-size: 17px; font-weight: 700; color: #fff; margin-bottom: 6px; }
  .role-card p  { font-size: 12px; color: var(--muted); line-height: 1.5; }
  .role-badge {
    display: inline-block;
    margin-top: 16px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .student .role-badge { background: rgba(79,142,247,0.15); color: var(--accent); }
  .teacher .role-badge { background: rgba(34,197,94,0.15); color: var(--green); }
  .admin   .role-badge  { background: rgba(245,166,35,0.15); color: var(--gold); }

  /* PANEL LAYOUT */
  #panel { display: none; min-height: 100vh; }

  .panel-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(12,15,26,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 24px;
    height: 64px;
  }
  .back-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'Sora', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .back-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }

  .header-brand { font-size: 15px; font-weight: 700; color: #fff; }
  .header-brand span { opacity: 0.4; margin: 0 6px; }
  .header-role {
    font-size: 12px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 6px;
  }
  .student-role { background: rgba(79,142,247,0.15); color: var(--accent); }
  .teacher-role { background: rgba(34,197,94,0.15); color: var(--green); }
  .admin-role   { background: rgba(245,166,35,0.15); color: var(--gold); }

  .header-user {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: var(--muted);
  }
  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
  }
  .student-avatar { background: linear-gradient(135deg, #4f8ef7, #7c3aed); }
  .teacher-avatar { background: linear-gradient(135deg, #22c55e, #15803d); }
  .admin-avatar   { background: linear-gradient(135deg, #f5a623, #ef4444); }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 4px;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    overflow-x: auto;
  }
  .nav-tab {
    padding: 8px 18px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Sora', sans-serif;
  }
  .nav-tab:hover { color: var(--text); background: var(--surface2); }
  .nav-tab.active { color: #fff; background: var(--surface2); border: 1px solid var(--border); }
  .nav-tab.active.s { color: var(--accent); }
  .nav-tab.active.t { color: var(--green); }
  .nav-tab.active.a { color: var(--gold); }

  /* CONTENT */
  .content { padding: 32px; max-width: 1100px; margin: 0 auto; }

  .tab-content { display: none; }
  .tab-content.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 20px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-title { font-size: 16px; font-weight: 700; color: #fff; }
  .card-sub   { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }
  .stat-box::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }
  .stat-box.blue::after  { background: var(--accent); }
  .stat-box.green::after { background: var(--green); }
  .stat-box.gold::after  { background: var(--gold); }
  .stat-box.red::after   { background: var(--red); }
  .stat-box.purple::after { background: #a78bfa; }

  .stat-value { font-size: 28px; font-weight: 800; color: #fff; font-family: 'JetBrains Mono', monospace; }
  .stat-label { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* EXAM CARD */
  .exam-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: all 0.2s;
  }
  .exam-item:hover { border-color: rgba(255,255,255,0.12); transform: translateX(2px); }
  .exam-month {
    min-width: 60px;
    height: 60px;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .exam-month .day { font-size: 20px; font-weight: 800; font-family: 'JetBrains Mono', monospace; line-height: 1; margin-top: 2px; }
  .em-blue   { background: rgba(79,142,247,0.15); color: var(--accent); }
  .em-green  { background: rgba(34,197,94,0.15); color: var(--green); }
  .em-gold   { background: rgba(245,166,35,0.15); color: var(--gold); }
  .em-red    { background: rgba(239,68,68,0.15); color: var(--red); }
  .em-purple { background: rgba(167,139,250,0.15); color: #a78bfa; }

  .exam-info { flex: 1; }
  .exam-name { font-size: 15px; font-weight: 600; color: #fff; margin-bottom: 4px; }
  .exam-meta { font-size: 12px; color: var(--muted); display: flex; gap: 16px; flex-wrap: wrap; }
  .exam-meta span { display: flex; align-items: center; gap: 4px; }

  .status-badge {
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .sb-active  { background: rgba(34,197,94,0.15); color: var(--green); }
  .sb-waiting { background: rgba(245,166,35,0.15); color: var(--gold); }
  .sb-done    { background: rgba(107,114,128,0.2); color: var(--muted); }
  .sb-review  { background: rgba(79,142,247,0.15); color: var(--accent); }
  .sb-upcoming{ background: rgba(167,139,250,0.15); color: #a78bfa; }

  /* BUTTONS */
  .btn {
    padding: 10px 20px;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Sora', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .btn-primary  { background: var(--accent); color: #fff; }
  .btn-primary:hover { background: #6096f8; transform: translateY(-1px); }
  .btn-green    { background: var(--green); color: #fff; }
  .btn-green:hover { background: #16a34a; }
  .btn-gold     { background: var(--gold); color: #000; }
  .btn-gold:hover { background: #e8941f; }
  .btn-ghost    { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); }
  .btn-ghost:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .btn-danger   { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
  .btn-sm       { padding: 6px 14px; font-size: 12px; }

  /* TABLE */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left;
    padding: 10px 14px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 14px;
    font-size: 13px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  /* PROGRESS BAR */
  .progress-bar {
    height: 6px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.5s ease;
  }

  /* FORM ELEMENTS */
  .form-group { margin-bottom: 18px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 8px; display: block; letter-spacing: 0.5px; }
  .form-input, .form-select, .form-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    font-family: 'Sora', sans-serif;
    transition: border-color 0.2s;
    outline: none;
  }
  .form-input:focus, .form-select:focus, .form-textarea:focus {
    border-color: rgba(79,142,247,0.5);
    box-shadow: 0 0 0 3px rgba(79,142,247,0.1);
  }
  .form-select option { background: var(--surface); }
  .form-textarea { resize: vertical; min-height: 100px; }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 100%;
    max-width: 600px;
    max-height: 90vh;
    overflow-y: auto;
    animation: modalIn 0.3s cubic-bezier(.4,0,.2,1);
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .modal-title  { font-size: 18px; font-weight: 700; color: #fff; }
  .modal-close  { background: var(--surface2); border: 1px solid var(--border); color: var(--muted); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
  .modal-close:hover { color: var(--text); }

  /* TIMER */
  .exam-timer {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--accent);
    background: rgba(79,142,247,0.1);
    border: 1px solid rgba(79,142,247,0.2);
    padding: 8px 16px;
    border-radius: 10px;
  }
  .timer-warning { color: var(--red); background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.2); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.6; } }

  /* ANSWER OPTION */
  .answer-opt {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .answer-opt:hover { border-color: rgba(79,142,247,0.4); background: rgba(79,142,247,0.05); }
  .answer-opt.selected { border-color: var(--accent); background: rgba(79,142,247,0.1); }
  .answer-opt.correct  { border-color: var(--green); background: rgba(34,197,94,0.1); }
  .answer-opt.wrong    { border-color: var(--red); background: rgba(239,68,68,0.1); }
  .opt-circle {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700;
    flex-shrink: 0; margin-top: 1px;
    transition: all 0.2s;
  }
  .selected .opt-circle { border-color: var(--accent); background: var(--accent); color: #fff; }
  .correct  .opt-circle { border-color: var(--green); background: var(--green); color: #fff; }
  .wrong    .opt-circle { border-color: var(--red); background: var(--red); color: #fff; }

  /* CHIP */
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 12px;
  }
  .q-num { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 8px; }
  .q-text { font-size: 14px; color: var(--text); line-height: 1.6; margin-bottom: 16px; }
  .q-actions { display: flex; gap: 8px; flex-wrap: wrap; }

  /* SCORE CIRCLE */
  .score-big {
    width: 120px; height: 120px;
    border-radius: 50%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 32px; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    background: conic-gradient(var(--accent) calc(var(--pct) * 1%), var(--surface2) 0);
    position: relative;
    margin: 0 auto 24px;
  }
  .score-big::before {
    content: '';
    position: absolute;
    inset: 8px;
    border-radius: 50%;
    background: var(--surface);
  }
  .score-big span { position: relative; z-index: 1; }
  .score-sub { font-size: 12px; color: var(--muted); font-weight: 400; font-family: 'Sora', sans-serif; }

  /* SECTION TITLE */
  .section-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 20px 0; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty .icon { font-size: 48px; margin-bottom: 16px; opacity: 0.5; }
  .empty p { font-size: 14px; }

  /* ALERT */
  .alert {
    padding: 14px 18px;
    border-radius: 10px;
    font-size: 13px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .alert-info    { background: rgba(79,142,247,0.1); border: 1px solid rgba(79,142,247,0.2); color: #93c5fd; }
  .alert-warning { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.2); color: #fcd34d; }
  .alert-success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #86efac; }

  /* GRADING */
  .grading-row {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 10px;
  }
  .student-name-row {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  /* TAG */
  .tag {
    display: inline-flex;
    align-items: center;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .tag-math { background: rgba(167,139,250,0.15); color: #a78bfa; }
  .tag-phys { background: rgba(79,142,247,0.15); color: var(--accent); }
  .tag-chem { background: rgba(34,197,94,0.15); color: var(--green); }
  .tag-az   { background: rgba(245,166,35,0.15); color: var(--gold); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 3px; }
</style>
</head>
<body>

<!-- ROLE SELECTOR -->
<div id="role-screen">
  <div class="logo-area">
    <div class="brand">Rim Academy</div>
    <h1>Aylıq <span>İmtahan</span> Paneli</h1>
    <p>Rolunuzu seçin — interfeys avtomatik açılacaq</p>
  </div>
  <div class="role-cards">
    <div class="role-card student" onclick="openPanel('student')">
      <span class="role-icon">🎓</span>
      <h3>Tələbə</h3>
      <p>İmtahana girin, nəticənizi görün</p>
      <span class="role-badge">Tələbə Paneli</span>
    </div>
    <div class="role-card teacher" onclick="openPanel('teacher')">
      <span class="role-icon">👨‍🏫</span>
      <h3>Müəllim</h3>

// ─── OPEN PANEL ───────────────────────────────────────────────────────
function openPanel(role) {
  currentRole = role;

  const names = { student: 'Əli Hüseynov', teacher: 'Nərmin Əliyeva', admin: 'Admin' };

  const roleLabels = { student: 'Tələbə', teacher: 'Müəllim', admin: 'Admin' };
  const roleBadgeClasses = { student: 'student-role', teacher: 'teacher-role', admin: 'admin-role' };

  document.getElementById('user-name').textContent = names[role];
  const av = document.getElementById('user-avatar');
  av.className = 'avatar ' + avatarClasses[role];

function goBack() {
  if (examStarted) { if (!confirm('İmtahanı tərk etmək istəyirsiniz? İmtahan bitmiş sayılacaq.')) return; }
  clearInterval(examTimer);
  examStarted = false;
  document.getElementById('role-screen').style.display = 'flex';
  document.getElementById('panel').style.display = 'none';
}

// ─── TAB SYSTEM ───────────────────────────────────────────────────────
function setTabs(tabs, contents, colorClass) {
  const nav = document.getElementById('nav-tabs');
  nav.innerHTML = tabs.map((t, i) =>
    `<button class="nav-tab ${colorClass} ${i===0?'active':''}" onclick="switchTab(${i})">${t}</button>`
  ).join('');
  document.getElementById('panel-content').innerHTML = contents.map((c, i) =>
    `<div class="tab-content ${i===0?'active':''}" id="tab-${i}">${c}</div>`
  ).join('');
}

function switchTab(i) {
  document.querySelectorAll('.nav-tab').forEach((t,j) => t.classList.toggle('active', i===j));
  document.querySelectorAll('.tab-content').forEach((t,j) => t.classList.toggle('active', i===j));
  currentTab = i;
}

// ─── MODAL ────────────────────────────────────────────────────────────
function openModal(title, body) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

// ─── EXAM SESSION ─────────────────────────────────────────────────────
function startExam() {
  examStarted = true;
  tabSwitchCount = 0;
  selectedAnswers = {};
  currentQuestion = 0;
  examSeconds = 135 * 60;

  document.addEventListener('visibilitychange', handleTabSwitch);

  const questions = [
    {fenn:'Riyaziyyat', type:'closed', text:'2x + 5 = 13 tənliyinin həlli nədir?', opts:['x = 3','x = 4','x = 5','x = 6']},
    {fenn:'Riyaziyyat', type:'closed', text:'Düzbucaqlı üçbucağın hipotenuzası 10, bir katetin uzunluğu 6-dır. Digər katetin uzunluğu?', opts:['7','8','9','10']},
    {fenn:'Fizika',     type:'closed', text:'Işığın boşluqda sürəti neçə km/s-dir?', opts:['200 000','300 000','400 000','500 000']},
    {fenn:'Fizika',     type:'open',   text:'Kütləsi 2 kq olan cisim 5 m/s² sürətlənmə ilə hərəkət edir. Cismə təsir edən qüvvəni tapın.'},
    {fenn:'Kimya',      type:'closed', text:'H₂O molekulundakı hidrogen atomlarının sayı nədir?', opts:['1','2','3','4']},
  ];

  openModal('May 2025 — Aylıq İmtahan', renderExamQuestion(questions, 0));
  startTimer();
}

function renderExamQuestion(questions, idx) {
  const q = questions[idx];
  const pct = Math.round((idx / questions.length) * 100);
  return `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div>
        <span class="chip">${q.fenn}</span>
        <span class="chip" style="margin-left:6px">${q.type==='open'?'Açıq tip':'Qapalı tip'}</span>
      </div>
      <div class="exam-timer" id="exam-timer-display">02:15:00</div>
    </div>
    <div class="progress-bar" style="margin-bottom:20px;">
      <div class="progress-fill" style="width:${pct}%;background:var(--accent);"></div>
    </div>
    <div style="font-size:11px;color:var(--muted);margin-bottom:16px;">Sual ${idx+1} / ${questions.length}</div>
    <div class="q-text" style="font-size:15px;margin-bottom:20px;">${q.text}</div>
    ${q.type==='closed' ? q.opts.map((o,j)=>`
      <div class="answer-opt" id="opt-${j}" onclick="selectOpt(${j}, ${questions.length})">
        <div class="opt-circle">${['A','B','C','D'][j]}</div>
        <span>${o}</span>
      </div>
    `).join('') : `
      <textarea class="form-textarea" placeholder="Cavabınızı buraya yazın..." rows="4"></textarea>
    `}
    <div style="display:flex;justify-content:space-between;margin-top:24px;">
      ${idx > 0 ? `<button class="btn btn-ghost" onclick="startExam()">← Geri</button>` : '<div></div>'}
      ${idx < questions.length-1
        ? `<button class="btn btn-primary" onclick="nextQuestion(${questions.length})">Növbəti →</button>`
        : `<button class="btn btn-green" onclick="submitExam()">✓ Bitir və Göndər</button>`}
    </div>
  `;
}

function selectOpt(j) {
  document.querySelectorAll('.answer-opt').forEach((el,i) => {
    el.classList.toggle('selected', i === j);
    el.querySelector('.opt-circle').classList.remove('selected');
  });
  document.getElementById('opt-'+j).classList.add('selected');
}

function nextQuestion(total) {
  currentQuestion++;
  if (currentQuestion >= total) submitExam();
  else {
    const questions = [
      {fenn:'Riyaziyyat', type:'closed', text:'2x + 5 = 13 tənliyinin həlli nədir?', opts:['x = 3','x = 4','x = 5','x = 6']},
      {fenn:'Fizika', type:'closed', text:'Işığın boşluqda sürəti neçə km/s-dir?', opts:['200 000','300 000','400 000','500 000']},
      {fenn:'Fizika', type:'open', text:'Kütləsi 2 kq olan cisim 5 m/s² sürətlənmə ilə hərəkət edir.'},
      {fenn:'Kimya', type:'closed', text:'H₂O molekulundakı hidrogen atomlarının sayı nədir?', opts:['1','2','3','4']},
    ];
    document.getElementById('modal-body').innerHTML = renderExamQuestion(questions, Math.min(currentQuestion, questions.length-1));
    startTimer();
  }
}

function submitExam() {
  clearInterval(examTimer);
  examStarted = false;
  document.removeEventListener('visibilitychange', handleTabSwitch);
  document.getElementById('modal-body').innerHTML = `
    <div style="text-align:center;padding:20px 0;">
      <div style="font-size:64px;margin-bottom:16px">✅</div>
      <h2 style="font-size:22px;font-weight:800;color:#fff;margin-bottom:8px">İmtahan göndərildi!</h2>
      <p style="color:var(--muted);font-size:14px;margin-bottom:24px">Müəllim açıq tipli sualları yoxladıqdan sonra nəticəniz görünəcək.</p>
      <div class="alert alert-info">📨 Nəticəniz hazır olduqda sizə bildiriş gəlməyəcək — panel-ə daxil olub yoxlayın.</div>
      <button class="btn btn-primary" onclick="closeModal()">Bağla</button>
    </div>
  `;
}

function startTimer() {
  clearInterval(examTimer);
  examTimer = setInterval(() => {
    examSeconds--;
    const h = String(Math.floor(examSeconds/3600)).padStart(2,'0');
    const m = String(Math.floor((examSeconds%3600)/60)).padStart(2,'0');
    const s = String(examSeconds%60).padStart(2,'0');
    const el = document.getElementById('exam-timer-display');
    if (!el) { clearInterval(examTimer); return; }
    el.textContent = `${h}:${m}:${s}`;
    if (examSeconds < 300) el.className = 'exam-timer timer-warning';
    if (examSeconds <= 0) { clearInterval(examTimer); submitExam(); }
  }, 1000);
}

function handleTabSwitch() {
  if (!examStarted || !document.hidden) return;
  tabSwitchCount++;
  if (tabSwitchCount === 1) {
    alert('⚠️ Xəbərdarlıq! Başqa tabı açdınız. Bir daha edərsinizsə imtahan dayandırılacaq.');
  } else {
    alert('🚫 İmtahan dayandırıldı! Başqa tab açmağa cəhd etdiniz.');
    submitExam();
    closeModal();
  }
}

function showAnswers() {
  openModal('Aprel 2025 — Cavab Açarı', `
    <div class="alert alert-success">✅ Nəticəniz: <strong>521 bal</strong> | Düzgün: 74/90</div>
    ${[
      {n:1,text:'2x + 5 = 13 tənliyinin həlli nədir?',opts:['x = 3','x = 4','x = 5','x = 6'],correct:1,selected:1},
      {n:2,text:'Düzbucaqlı üçbucağın hipotenuzası 10, katet 6. Digər katet?',opts:['7','8','9','10'],correct:1,selected:2},

        <div class="q-text">${q.text}</div>
        ${q.opts.map((o,j)=>`
          <div class="answer-opt ${j===q.correct?'correct':j===q.selected&&j!==q.correct?'wrong':''}">
            <div class="opt-circle">${['A','B','C','D'][j]}</div>
            <span>${o}</span>
          </div>
        `).join('')}
      </div>
    `).join('')}
  `);
